replicaCount: 1

image:
  repository: ghcr.io/snothub/mcp-for-argocd
  tag: "latest"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  annotations: {}

service:
  type: ClusterIP
  port: 3000

auth:
  enabled: false
  tokens:
  - 8803f621acc3898df1d7a8f514bc3602551a0681a8f747bd4e43c3c5849d57a7 # danijel

argocd:
  baseUrl: ""
  apiToken: ""
  existingSecret: ""
  readOnly: true

ingressRoute:
  enabled: true
  host: ""
  entryPoints:
  - websecure
  tls:
    secretName: argocd-mcp-tls
    clusterIssuer: letsencrypt-prod
  middlewares: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

extraEnv: []
