{{- if not .Values.argocd.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "argocd-mcp.fullname" . }}
  labels:
    {{- include "argocd-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  ARGOCD_BASE_URL: {{ .Values.argocd.baseUrl | quote }}
  ARGOCD_API_TOKEN: {{ .Values.argocd.apiToken | quote }}
{{- end }}
