{{- if .Values.auth.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "argocd-mcp.authFullname" . }}-tokens
  labels:
    {{- include "argocd-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  tokens: |
{{ range .Values.auth.tokens -}}
{{ . | trim | indent 4 }}
{{ end }}
{{- end }}