apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "argocd-mcp.fullname" . }}
  labels:
    {{- include "argocd-mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "argocd-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "argocd-mcp.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "argocd-mcp.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: ARGOCD_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "argocd-mcp.secretName" . }}
                  key: ARGOCD_BASE_URL
            - name: ARGOCD_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "argocd-mcp.secretName" . }}
                  key: ARGOCD_API_TOKEN
            {{- if .Values.argocd.readOnly }}
            - name: MCP_READ_ONLY
              value: "true"
            {{- end }}
            {{- range .Values.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
