{{- if .Values.ingressRoute.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "argocd-mcp.fullname" . }}
  labels:
    {{- include "argocd-mcp.labels" . | nindent 4 }}
spec:
  entryPoints:
    {{- toYaml .Values.ingressRoute.entryPoints | nindent 4 }}
  routes:
    - match: Host(`{{ .Values.ingressRoute.host }}`)
      kind: Rule
      {{- if .Values.auth.enabled }}
      middlewares:
        - name: {{ include "argocd-mcp.fullname" . }}-auth
          namespace: {{ .Release.Namespace }}
      {{- end }}
      services:
        - name: {{ include "argocd-mcp.fullname" . }}
          port: {{ .Values.service.port }}
      {{- if .Values.ingressRoute.middlewares }}
      middlewares:
        {{- toYaml .Values.ingressRoute.middlewares | nindent 8 }}
      {{- end }}
  {{- if .Values.ingressRoute.tls.secretName }}
  tls:
    secretName: {{ .Values.ingressRoute.tls.secretName }}
  {{- end }}
{{- end }}
